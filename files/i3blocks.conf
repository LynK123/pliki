# i3blocks config file
#
# Please see man i3blocks for a complete reference!
# The man page is also hosted at http://vivien.github.io/i3blocks
#
# List of valid properties:
#
# align
# color
# background
# border
# command
# full_text
# instance
# interval
# label
# min_width
# name
# separator
# separator_block_width
# short_text
# signal
# urgent


###
### Global properties
###
### The top properties below are applied to every block, but can be overridden.
### Each block command defaults to the script name to avoid boilerplate.
command=$SCRIPT_DIR/$BLOCK_NAME
separator_block_width=35
markup=pango


###
### Modules defines
###
[cputemp]
command=~/.local/share/i3blocks-modules/cputemp -tw '{temp}' '>' 75 -tc '{temp}' '>' 90
instance=Core 0
interval=1

[memory]
command=~/.local/share/i3blocks-modules/memory -f '{used} {uunit}B' -tw '{pfree}' '<' 30 -tc '{pfree}' '<' 15
interval=5

[disk]
command=~/.local/share/i3blocks-modules/disk -f '{used}/{total} {uunit}B' -tc '{pfree}' '<' 20 -tc '{pfree}' '<' 10
instance=/
interval=30

[online]
command=~/.local/share/i3blocks-modules/online -fe '{status}' '=' 'online' '{status}, {city}' -fe '{status}' '=' 'offline' '{status}'
interval=2

[battery]
command=~/.local/share/i3blocks-modules/battery -fe '{percent}' '<' 90 '{percent}%' -fe '{percent}' '<' 75 '{percent}%' -fe '{percent}' '<' 60 '{percent}%' -fe '{percent}' '<' 35 '{percent}%' -fe '{percent}' '<' 5 '{percent}%' -fe '{status}' '=' '^charging' '{percent}%' -fe '{status}' '=' 'full' '{percent}%' -tg '{status}' '=' 'full' -tg '{percent}' '=' 100 -ti '{status}' '=' '^charging' -tw '{percent}' '<' 30 -tc '{percent}' '<' 5
instance=Battery 0
interval=1

[volume]
command=~/.local/share/i3blocks-modules/volume -f "{icon}{volume}%" -id "" -im "" -fe '{port}' '=' 'headphone' '{icon}{volume}%' -fe '{dev_bus}' '=' 'bluetooth' '{icon}{volume}%' -tw '{muted}' '=' 'yes'
interval=1
signal=1

[date]
command=~/.local/share/i3blocks-modules/date -f "{time}" -t "%a, %d.%m.%Y" -tg '{time}' '=' '^(Sat|Sun).*'
interval=60

[time]
command=~/.local/share/i3blocks-modules/date -f "{time}" -t "%H:%M " -tw '{time}' '=' '^23.*' -tc '{time}' '=' '^0(0|1|2|3).*'
interval=5
